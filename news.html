<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar scrolled">
    <div class="container">
      <a href="index.html" class="nav-brand"><span class="nav-flag"></span><span class="brand-text"><span class="brand-name"></span><span class="brand-sub" data-i18n="common.tagline"></span></span></a>
      <button class="menu-toggle" onclick="toggleMenu()" aria-label="Menu">☰</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html" data-i18n="nav.home">Home</a></li>
        <li><a href="study.html" data-i18n="nav.study">Study</a></li>
        <li><a href="work.html" data-i18n="nav.work">Work</a></li>
        <li><a href="visa.html" data-i18n="nav.visa">Visa</a></li>
        <li><a href="life.html" data-i18n="nav.life">Life</a></li>
        <li><a href="travel.html" data-i18n="nav.travel">Travel</a></li>
        <li><a href="community.html" data-i18n="nav.community">Community</a></li>
        <li><button class="lang-btn" id="lang-toggle" onclick="toggleLanguage()">한국어</button></li>
      </ul>
    </div>
  </nav>

  <section class="page-header"><h1 data-i18n="news.pageTitle">Latest News</h1></section>

  <section class="section">
    <div class="container">
      <div class="news-filters">
        <button class="news-filter-btn active" data-category="" data-i18n="news.filterAll">All</button>
        <button class="news-filter-btn" data-category="정책변경" data-i18n="news.filterPolicy">Policy</button>
        <button class="news-filter-btn" data-category="시험일정" data-i18n="news.filterExam">Exam</button>
        <button class="news-filter-btn" data-category="커뮤니티" data-i18n="news.filterCommunity">Community</button>
        <button class="news-filter-btn" data-category="긴급공지" data-i18n="news.filterUrgent">Urgent</button>
      </div>
      <div id="full-news-list" class="news-list news-list-full"></div>
    </div>
  </section>

  <footer class="footer"><div class="footer-brand"></div><div class="footer-flags"></div><p data-i18n="footer.text"></p></footer>

  <script src="js/site-config.js"></script>
  <script>
    if (SITE_KEY === 'main') { window.location.replace('landing.html'); }
    else {
      var langScript = document.createElement('script');
      langScript.src = 'sites/' + SITE_KEY + '/lang.js';
      langScript.onload = function() {
        var mainScript = document.createElement('script');
        mainScript.src = 'js/main.js';
        mainScript.onload = function() {
          var extraScript = document.createElement('script');
          extraScript.src = 'js/news.js';
          document.head.appendChild(extraScript);
        };
        document.head.appendChild(mainScript);
      };
      document.head.appendChild(langScript);
    }
  </script>
</body>
</html>
