      </ul>
    </div>

  <section class="page-header"><h1 data-i18n="community.title">Community</h1></section>

  <section class="section">
    <div class="container">
      <div class="board-container">

        <!-- List View -->
        <div id="board-list-view" class="board-view">
          <div class="board-toolbar">
            <div class="board-categories" id="board-categories">
              <button class="board-cat-btn active" data-cat="all">All</button>
              <button class="board-cat-btn" data-cat="free">Free Board</button>
              <button class="board-cat-btn" data-cat="question">Q&A</button>
              <button class="board-cat-btn" data-cat="info">Info Share</button>
              <button class="board-cat-btn" data-cat="job">Jobs</button>
              <button class="board-cat-btn" data-cat="trade">Trade</button>
            </div>
            <button class="board-write-btn" id="btn-write" onclick="boardShowWrite()">Write</button>
          </div>

          <div class="board-table-wrap">
            <table class="board-table">
              <thead>
                <tr>
                  <th class="col-no">No.</th>
                  <th class="col-cat">Category</th>
                  <th class="col-title">Title</th>
                  <th class="col-author">Author</th>
                  <th class="col-date">Date</th>
                  <th class="col-views">Views</th>
                </tr>
              </thead>
              <tbody id="board-list"></tbody>
            </table>
          </div>

          <div id="board-empty" class="board-empty" style="display:none;">No posts yet.</div>
          <div id="board-pagination" class="board-pagination"></div>
        </div>

        <!-- Detail View -->
        <div id="board-detail-view" class="board-view" style="display:none;">
          <div class="board-detail">
            <div class="board-detail-header">
              <span class="board-detail-cat" id="detail-cat"></span>
              <h2 id="detail-title"></h2>
              <div class="board-detail-meta">
                <span id="detail-author"></span>
                <span id="detail-date"></span>
                <span id="detail-views"></span>
              </div>
            </div>
            <div class="board-detail-content" id="detail-content"></div>
            <div class="board-detail-actions">
              <button class="btn-secondary" id="btn-back" onclick="boardShowList()">Back</button>
              <div class="board-detail-btns">
                <button class="btn-edit" id="btn-edit" onclick="boardEditPost()">Edit</button>
                <button class="btn-delete" id="btn-delete" onclick="boardDeletePost()">Delete</button>
              </div>
            </div>
          </div>

          <div class="board-comments">
            <h3 id="comments-title">Comments (<span id="comments-count">0</span>)</h3>
            <div id="comments-list"></div>
            <div class="board-comment-form">
              <input type="text" id="comment-author" placeholder="Your name" maxlength="30">
              <textarea id="comment-content" rows="3" placeholder="Write a comment..." maxlength="500"></textarea>
              <button class="btn-primary" id="btn-comment-submit" onclick="boardAddComment()">Submit</button>
            </div>
          </div>
        </div>

        <!-- Write/Edit View -->
        <div id="board-write-view" class="board-view" style="display:none;">
          <h2 id="write-view-title">Write New Post</h2>
          <form id="board-form" class="board-form" onsubmit="boardSubmitPost(event)">
            <input type="hidden" id="edit-post-id" value="">
            <div class="form-group">
              <label>Category</label>
              <select id="post-category" required>
                <option value="free">Free Board</option>
                <option value="question">Q&A</option>
                <option value="info">Info Share</option>
                <option value="job">Jobs</option>
                <option value="trade">Trade</option>
              </select>
            </div>
            <div class="form-group">
              <label>Title</label>
              <input type="text" id="post-title" required maxlength="100" placeholder="Enter title">
            </div>
            <div class="form-group">
              <label>Author</label>
              <input type="text" id="post-author" required maxlength="30" placeholder="Your name">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="post-password" required minlength="4" maxlength="20" placeholder="Min. 4 characters">
              <small>For editing/deleting later</small>
            </div>
            <div class="form-group">
              <label>Content</label>
              <textarea id="post-content" rows="12" required maxlength="5000" placeholder="Write your post..."></textarea>
            </div>
            <div class="form-actions">
              <button type="button" class="btn-secondary" onclick="boardShowList()">Cancel</button>
              <button type="submit" class="btn-primary">Submit</button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </section>

  <!-- Password Modal -->
  <div id="password-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <h3 id="modal-title">Enter password</h3>
      <input type="password" id="modal-password" placeholder="Password" maxlength="20">
      <p id="modal-error" class="modal-error" style="display:none;">Wrong password</p>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closePasswordModal()">Cancel</button>
        <button class="btn-primary" onclick="confirmPassword()">OK</button>
      </div>
    </div>
  </div>

  <footer class="footer"><div class="footer-brand"></div><div class="footer-flags"></div><p data-i18n="footer.text"></p></footer>

  <script src="js/site-config.js"></script>
  <script>
    if (SITE_KEY === 'main') { window.location.replace('landing.html'); }
    else {
      var langScript = document.createElement('script');
      langScript.src = 'sites/' + SITE_KEY + '/lang.js';
      langScript.onload = function() {
        var mainScript = document.createElement('script');
        mainScript.src = 'js/main.js';
        mainScript.onload = function() {
          var extraScript = document.createElement('script');
          extraScript.src = 'js/board.js';
          document.head.appendChild(extraScript);
        };
        document.head.appendChild(mainScript);
      };
      document.head.appendChild(langScript);
    }
  </script>
